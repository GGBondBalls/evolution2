experiment:
  name: tiny_nt_memevo_gate_unsafe_polluted_seed1
  seed: 1
  output_dir: runs/tiny_nt_memevo_gate_unsafe_polluted_seed1

benchmark:
  name: tiny_tools
  split_file: data/task_splits/tiny_refund_only_tasks.json
  max_tasks: 1

agent:
  type: react_tool_agent
  max_steps: 4
  memory_top_k: 1

models:
  actor:
    provider: mock
    model: mock-memory-sensitive-agent
    follow_memory_hints: true
    temperature: 0.0
    max_tokens: 512

memory:
  method: nt_memevo_gate
  top_k: 1
  bootstrap_file: data/memory_fixtures/tiny_polluted_candidates.jsonl
  save_successes: true
  save_failures: true
  extractor_model: deterministic_candidate_extractor_v1
  domain: retail
  ttl: 50
  max_claim_chars: 700
  gate:
    min_score: -1.0
    min_similarity: 0.0
    min_precondition: 0.0
    max_risk: 1.0
    reject_negative_evidence: false
    allowed_statuses: ["candidate", "active", "quarantined"]

logging:
  save_raw_model_io: true
  save_trace_events: true
  save_costs: true
