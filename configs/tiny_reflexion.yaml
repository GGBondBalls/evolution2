experiment:
  name: tiny_reflexion_seed1
  seed: 1
  output_dir: runs/tiny_reflexion_seed1

benchmark:
  name: tiny_tools
  split_file: data/task_splits/tiny_tool_tasks.json
  max_tasks: 5

agent:
  type: react_tool_agent
  max_steps: 4
  memory_top_k: 2

models:
  actor:
    provider: mock
    model: mock-tool-agent
    temperature: 0.0
    max_tokens: 512

memory:
  method: reflexion
  top_k: 2
  save_successes: true
  save_failures: true
  max_reflection_chars: 700

logging:
  save_raw_model_io: true
  save_trace_events: true
  save_costs: true
