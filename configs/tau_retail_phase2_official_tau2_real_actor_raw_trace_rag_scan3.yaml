experiment:
  name: tau_retail_phase2_official_tau2_real_actor_raw_trace_rag_scan3_seed1
  seed: 1
  output_dir: runs/tau_retail_phase2_official_tau2_real_actor_raw_trace_rag_scan3_seed1

benchmark:
  name: tau_bench
  domain: retail
  split_file: data/external/tau2-bench/data/tau2/domains/retail/tasks.json
  task_split_file: data/external/tau2-bench/data/tau2/domains/retail/split_tasks.json
  task_split: base
  data_file: data/external/tau2-bench/data/tau2/domains/retail/db.json
  evaluation: official_like
  compare_action_args: true
  require_data: true
  validate_export_schema: true
  max_tasks: 3

agent:
  type: react_tool_agent
  max_steps: 16
  memory_top_k: 2
  stop_after_expected_actions: true

models:
  actor:
    provider: vllm
    model: qwen3.5-9b
    base_url_env: VLLM_BASE_URL
    base_url: http://127.0.0.1:8000/v1
    api_key: EMPTY
    temperature: 0.0
    max_tokens: 256
    response_format: json_object
    context_overflow_margin_tokens: 256
    timeout_seconds: 180
    request_retries: 2
    retry_sleep_seconds: 2
    healthcheck: true
    strip_thinking: true
    extract_json_object: true

memory:
  method: raw_trace_rag
  top_k: 2
  save_failures: true

logging:
  save_raw_model_io: true
  save_trace_events: true
  save_costs: true
