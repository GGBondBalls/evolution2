experiment:
  name: tiny_nomem_seed1
  seed: 1
  output_dir: runs/tiny_nomem_seed1

benchmark:
  name: tiny_tools
  split_file: data/task_splits/tiny_tool_tasks.json
  max_tasks: 5

agent:
  type: react_tool_agent
  max_steps: 4
  memory_top_k: 0

models:
  actor:
    provider: mock
    model: mock-tool-agent
    temperature: 0.0
    max_tokens: 512

logging:
  save_raw_model_io: true
  save_trace_events: true
  save_costs: true
