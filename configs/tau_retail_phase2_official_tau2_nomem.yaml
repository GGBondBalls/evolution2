experiment:
  name: tau_retail_phase2_official_tau2_nomem_seed1
  seed: 1
  output_dir: runs/tau_retail_phase2_official_tau2_nomem_seed1

benchmark:
  name: tau_bench
  domain: retail
  split_file: data/external/tau2-bench/data/tau2/domains/retail/tasks.json
  task_split_file: data/external/tau2-bench/data/tau2/domains/retail/split_tasks.json
  task_split: base
  data_file: data/external/tau2-bench/data/tau2/domains/retail/db.json
  evaluation: official_like
  compare_action_args: true
  require_data: true
  validate_export_schema: true
  max_tasks: 3

agent:
  type: react_tool_agent
  max_steps: 6
  memory_top_k: 0

models:
  actor:
    provider: mock
    model: mock-tool-agent
    temperature: 0.0
    max_tokens: 2048

logging:
  save_raw_model_io: true
  save_trace_events: true
  save_costs: true
