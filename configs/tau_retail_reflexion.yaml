experiment:
  name: tau_retail_reflexion_seed1
  seed: 1
  output_dir: runs/tau_retail_reflexion_seed1

benchmark:
  name: tau_bench
  domain: retail
  split_file: data/task_splits/tau_retail_smoke_tasks.json
  data_file: data/tau_bench/retail_smoke_db.json
  evaluation: auto
  max_tasks: 3

agent:
  type: react_tool_agent
  max_steps: 4
  memory_top_k: 2

models:
  actor:
    provider: mock
    model: mock-tool-agent
    temperature: 0.0
    max_tokens: 2048

memory:
  method: reflexion
  top_k: 2
  save_successes: true
  save_failures: true
  max_reflection_chars: 700

logging:
  save_raw_model_io: true
  save_trace_events: true
  save_costs: true
