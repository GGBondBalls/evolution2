experiment:
  name: tiny_nt_memevo_candidate_seed1
  seed: 1
  output_dir: runs/tiny_nt_memevo_candidate_seed1

benchmark:
  name: tiny_tools
  split_file: data/task_splits/tiny_tool_tasks.json
  max_tasks: 5

agent:
  type: react_tool_agent
  max_steps: 4
  memory_top_k: 0

models:
  actor:
    provider: mock
    model: mock-tool-agent
    temperature: 0.0
    max_tokens: 512

memory:
  method: nt_memevo_candidate
  top_k: 0
  save_successes: true
  save_failures: true
  extractor_model: deterministic_candidate_extractor_v1
  domain: retail
  ttl: 50
  max_claim_chars: 700

logging:
  save_raw_model_io: true
  save_trace_events: true
  save_costs: true
